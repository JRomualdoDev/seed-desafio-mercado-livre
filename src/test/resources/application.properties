spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:db;DB_CLOSE_ON_EXIT=FALSE;MODE=MYSQL

# 2. Desliga a execução automática de data.sql ou schema.sql pelo Spring Boot
spring.sql.init.mode=never

# 3. Garante que o Hibernate apenas crie as tabelas vazias para o teste
spring.jpa.hibernate.ddl-auto=create-drop